name = "hisaabkar"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "pakecon_db"
database_id = "ae3be8c7-7ee5-4670-a6e0-b3dba698bb5a"

[[kv_namespaces]]
binding = "KV"
id = "7787cef3b0c24599bf5fc7644e3d9cbd"


[vars]
ENVIRONMENT = "production"
HUMAN_REVIEW_MODE = "false"
TWITTER_ENABLED = "false"
TELEGRAM_ENABLED = "true"
# Secrets managed via: wrangler secret put <KEY>
# Required secrets: GITHUB_TOKEN, GITHUB_OWNER, GITHUB_REPO,
#   GROQ_API_KEY, OPENAI_API_KEY (fallback),
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHANNEL_ID,
#   GOOGLE_INDEXING_SA_KEY, NEWSLETTER_SECRET, AGENT_SECRET

# Cron triggers: configure in Cloudflare Pages dashboard
# Pages → hisaabkar → Settings → Functions → Cron Triggers
# Add: "0 */6 * * *"  (every 6h — rates & commodities)
# Add: "0 4 1 * *"    (1st of month — policy rate, CPI, CDNS)
